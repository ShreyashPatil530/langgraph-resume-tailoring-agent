sonar.projectKey=Recruform
sonar.projectName=Recruform - LangGraph Resume Tailoring Agent
sonar.projectVersion=1.0

# Source directories
sonar.sources=agent,monitoring,prompts
sonar.tests=tests

# Language
sonar.language=py
sonar.python.version=3.11

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,output/**,logs/**,input/**

# Encoding
sonar.sourceEncoding=UTF-8
